<html>
  <head>
    <meta charset="utf-8" />
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      function FunctionSampleComponent({ name, text }) {
        return (
          <h1>
            <b>{name}</b>&nbsp;{text}<i></i>
          </h1>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));

      root.render(
        <div>
          <FunctionSampleComponent name="Property 01" text="Texto 01" /> text
        </div>,
      );
    </script>
  </body>
</html>
