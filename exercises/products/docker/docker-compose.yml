services:
  exercise-node-service:
    image: node:22
    container_name: exercise-node
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  node_modules:
